name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build and package
        run: make deb

      - name: Upload .deb to release
        uses: softprops/action-gh-release@v2
        with:
          files: sonos-linux_*.deb
